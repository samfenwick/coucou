<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Coucou</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="enter-screen">
        <button id="enter-btn">Enter</button>
    </div>

    <div id="app" style="display:none">
        <div id="subtitle-area">
            <div id="subtitle-container">
                <p id="subtitle-text" class="inactive">Waiting for audio...</p>
                <p id="translation-text"></p>
            </div>
        </div>

        <div id="toolbar">
            <div class="toolbar-left">
                <span id="connection-status">Disconnected</span>
            </div>
            <div class="toolbar-center">
                <div class="volume-bar">
                    <button id="mute-toggle" class="btn-icon" title="Mute">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                        </svg>
                    </button>
                    <input type="range" id="volume" min="0" max="100" value="80">
                </div>
            </div>
            <div class="toolbar-right">
                <div id="translate-bar" style="display:none">
                    <button id="translate-toggle" class="lang-toggle" title="Toggle translation"></button>
                    <span class="lang-arrow">&rarr;</span>
                    <select id="target-lang">
                        <option value="en">🇬🇧 EN</option>
                        <option value="fr">🇫🇷 FR</option>
                        <option value="es">🇪🇸 ES</option>
                        <option value="de">🇩🇪 DE</option>
                        <option value="it">🇮🇹 IT</option>
                        <option value="pt">🇵🇹 PT</option>
                        <option value="nl">🇳🇱 NL</option>
                        <option value="pl">🇵🇱 PL</option>
                        <option value="ru">🇷🇺 RU</option>
                        <option value="ja">🇯🇵 JA</option>
                        <option value="ko">🇰🇷 KO</option>
                        <option value="zh">🇨🇳 ZH</option>
                        <option value="ar">🇦🇪 AR</option>
                        <option value="hi">🇮🇳 HI</option>
                        <option value="sv">🇸🇪 SV</option>
                        <option value="da">🇩🇰 DA</option>
                        <option value="no">🇳🇴 NO</option>
                        <option value="tr">🇹🇷 TR</option>
                        <option value="uk">🇺🇦 UK</option>
                        <option value="cs">🇨🇿 CS</option>
                    </select>
                </div>
                <div class="toolbar-icons">
                    <button id="pip-toggle" class="btn-icon" title="Picture-in-Picture" style="display:none">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="3" width="20" height="14" rx="2"/>
                            <rect x="12" y="9" width="8" height="6" rx="1" fill="currentColor" opacity="0.3"/>
                        </svg>
                    </button>
                    <button id="settings-toggle" class="btn-icon" title="Settings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-drawer" class="drawer-hidden">
        <div id="settings-backdrop"></div>
        <div id="settings-panel">
            <div class="drawer-header">
                <h2>Settings</h2>
                <button id="settings-close" class="btn-icon">&times;</button>
            </div>
            <div class="drawer-body">
                <section class="setting-section">
                    <h3>Audio Output</h3>
                    <div class="setting-row">
                        <select id="output-select">
                            <option value="default">Default output</option>
                        </select>
                        <button id="refresh-outputs" class="btn-icon" title="Refresh">&#x21bb;</button>
                    </div>
                </section>

                <section class="setting-section">
                    <h3>Subtitle Font Size</h3>
                    <div class="setting-row">
                        <input type="range" id="font-size" min="14" max="72" value="32" step="2">
                        <span id="font-size-label" class="setting-value">32px</span>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
