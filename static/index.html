<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subcurrent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Subcurrent</h1>
        </header>
        <div id="controls">
            <div class="control-group">
                <label for="output-select">Speaker Output</label>
                <select id="output-select">
                    <option value="">Select speakers...</option>
                </select>
                <button id="refresh-outputs" title="Refresh">&#x21bb;</button>
            </div>
            <div class="control-group">
                <button id="start-stop">Start</button>
            </div>
            <div class="control-group">
                <label for="volume">Volume</label>
                <input type="range" id="volume" min="0" max="100" value="80">
            </div>
            <div class="control-group sync-control">
                <label for="sync-offset">Sync</label>
                <div class="sync-slider-row">
                    <button class="sync-nudge" id="sync-minus" title="-0.1s">-</button>
                    <span class="sync-hint">sooner</span>
                    <input type="range" id="sync-offset" min="0" max="10000" value="6000" step="100">
                    <span class="sync-hint">later</span>
                    <button class="sync-nudge" id="sync-plus" title="+0.1s">+</button>
                </div>
                <div class="sync-value-row">
                    <span id="sync-offset-label" class="sync-value">6.0s</span>
                    <button id="sync-reset" class="sync-reset" title="Reset to 0">reset</button>
                </div>
                <p class="sync-help">Controls audio delay — increase until audio matches subtitles</p>
            </div>
        </div>
        <div id="subtitle-area">
            <p id="subtitle-text">Waiting for audio...</p>
        </div>
        <div id="status-bar">
            <span id="connection-status">Disconnected</span>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
